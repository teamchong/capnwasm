<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>capnwasm codegen — in-browser</title>
  <style>
    body { font-family: -apple-system, system-ui, sans-serif; margin: 2em; max-width: 980px; }
    h1 { font-size: 1.4em; }
    pre { background: #f5f5f5; padding: 1em; border-radius: 4px; overflow-x: auto; font-size: 13px; }

<body>
  <h1>Compile a .capnp schema in the browser, run the generated reader.</h1>

  <div id="status">Loading…</div>

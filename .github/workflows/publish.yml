name: publish

# Triggered when a tag matching v* is pushed (e.g. `git tag v0.1.0 && git push --tags`).
# A manual dispatch is also allowed for re-publishing without a new tag.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

# Required repo configuration before this can run:
#   - Settings → Secrets → Actions → NPM_TOKEN  (an npm automation token with
#     publish access to the `capnwasm` package)
#   - The version field in package.json matches the pushed tag (without `v`).
#     The workflow refuses to publish if they disagree.

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # for npm provenance
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: pnpm

      - name: Install (workspace)
        run: pnpm install --frozen-lockfile

      - name: Install browser test dependencies
        run: pnpm exec playwright install --with-deps chromium

      - name: Generate web test schemas
        run: pnpm -C web run codegen

      - name: Run tests before publishing
        run: pnpm test

      - name: Verify tag matches package.json version
        if: github.event_name == 'push'
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          PKG=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$PKG" ]; then
            echo "Tag v$TAG does not match package.json version $PKG"
            exit 1
          fi

      - name: Publish to npm
        run: pnpm publish --provenance --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

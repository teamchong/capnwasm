name: build-wasm

# Reproduces the local wasm rebuild path in CI:
#   1. Installs zig 0.17 via scripts/install-zig-eh.sh (downloads to
#      ~/.local/share/capnwasm-zig/, drops .capnwasm-zig symlink in
#      the repo root that cpp/build*.sh look for).
#   2. Installs binaryen so wasm-opt is on PATH.
#   3. Runs cpp/build.sh + cpp/build_capnpc.sh + the JS build_inlined
#      scripts.
#   4. Diffs the resulting dist/ against the committed copy and fails
#      if they drifted — this is how we catch regressions in the wasm
#      build (e.g. someone edits cpp/wrapper.cpp without re-running
#      the install script locally).
#
# Triggered manually or whenever cpp/, scripts/install-zig-eh.sh, or
# js/build_inlined.mjs / js/build_codegen_inlined.mjs change. The main
# `tests` workflow doesn't rebuild wasm — it imports dist/inlined.mjs
# directly, which is faster but blind to wasm regressions; this
# workflow plugs that gap.

on:
  push:
    branches: [main]
    paths:
      - "cpp/**"
      - "scripts/install-zig-eh.sh"
      - "js/build_inlined.mjs"
      - "js/build_codegen_inlined.mjs"
      - ".github/workflows/build-wasm.yml"
  pull_request:
    paths:
      - "cpp/**"
      - "scripts/install-zig-eh.sh"
      - "js/build_inlined.mjs"
      - "js/build_codegen_inlined.mjs"
      - ".github/workflows/build-wasm.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install recent binaryen (wasm-opt)
        # Ubuntu's apt binaryen is v108 — too old to recognise
        # `--enable-bulk-memory-opt`, which our build passes since
        # zig 0.17/LLVM 22 emits bulk-memory-opt ops by default.
        # Fetch a recent precompiled release instead.
        run: |
          set -e
          BINARYEN_VERSION=124
          BINARYEN_TARBALL="binaryen-version_${BINARYEN_VERSION}-x86_64-linux.tar.gz"
          curl -fsSL "https://github.com/WebAssembly/binaryen/releases/download/version_${BINARYEN_VERSION}/${BINARYEN_TARBALL}" \
            -o /tmp/binaryen.tar.gz
          sudo tar -xzf /tmp/binaryen.tar.gz -C /usr/local --strip-components=1
          wasm-opt --version

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install workspace deps
        run: pnpm install --frozen-lockfile

      - name: Cache zig 0.17 download
        uses: actions/cache@v4
        with:
          path: ~/.local/share/capnwasm-zig
          key: capnwasm-zig-${{ runner.os }}-${{ runner.arch }}-0.17.0-dev.251

      - name: Install zig 0.17 + rebuild wasm
        run: bash scripts/install-zig-eh.sh

      - name: Run JS test suite against the freshly-built wasm
        # The committed dist/ is built on macOS-arm64; Linux-x64 zig
        # produces structurally-equivalent but not byte-identical
        # output (different host paths, build timestamps in metadata
        # sections, possible LLVM ISA-specific code-gen differences).
        # Reaching byte-determinism across hosts would need
        # SOURCE_DATE_EPOCH, -ffile-prefix-map for every path that
        # leaks in, and matching binaryen versions across platforms —
        # not worth the complexity. Instead, the install script writes
        # a fresh dist/ from this Linux runner, and pnpm test imports
        # those bytes (since dist/inlined.mjs etc. were just rewritten).
        # If the rebuild produced a broken wasm, the test suite fails.
        run: pnpm test

      - name: Surface dist/ delta as workflow summary (informational)
        if: always()
        run: |
          {
            echo "## dist/ delta vs committed"
            echo
            if git diff --quiet dist/; then
              echo "dist/ matches committed artifacts byte-for-byte ✓"
            else
              echo "dist/ rebuilt-on-Linux differs from committed (built on macOS-arm64):"
              echo
              echo '```'
              git diff --stat dist/ | head -20
              echo '```'
              echo
              echo "Tests run against the freshly-built artifacts above."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

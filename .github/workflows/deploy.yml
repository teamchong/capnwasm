name: deploy

# Deploys web/ + worker to Cloudflare Workers (route capnwasm.teamchong.net).
# Required repo configuration:
#   - Settings → Secrets → Actions → CLOUDFLARE_API_TOKEN
#       Token must have:  Account → Workers Scripts: Edit
#                         Account → Workers Routes: Edit (for the route)
#                         Zone   → Workers Routes: Edit (on teamchong.net)
#   - Settings → Secrets → Actions → CLOUDFLARE_ACCOUNT_ID

on:
  push:
    branches: [main]
  workflow_dispatch:

# Avoid two concurrent deploys racing each other.
concurrency:
  group: "deploy"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install (workspace)
        run: pnpm install --frozen-lockfile

      - name: Build web
        run: pnpm run build:web

      - name: Check Cloudflare credentials
        id: cloudflare
        run: |
          if [ -n "$CLOUDFLARE_API_TOKEN" ] && [ -n "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Cloudflare secrets are not configured; build passed, skipping deploy."
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Workers
        if: steps.cloudflare.outputs.ready == 'true'
        run: pnpm wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

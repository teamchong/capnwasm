name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      # The wasm artifacts in dist/ are committed, so the test suite (which
      # imports dist/inlined.mjs) runs without a wasm rebuild. Reproducing
      # the wasm build in CI requires zig + binaryen and is left out here on
      # purpose — those tools change less than the JS code, and a separate
      # workflow can run them on a schedule when we want to verify the
      # checked-in wasm matches a fresh build.
      - name: Install (workspace)
        run: pnpm install --frozen-lockfile

      - name: Install browser test dependencies
        run: pnpm exec playwright install --with-deps chromium

      - name: Install upstream Cap'n Proto CLI for interop tests
        run: sudo apt-get update && sudo apt-get install -y capnproto

      - name: Generate web test schemas
        run: pnpm -C web run codegen

      - name: Run unit tests
        run: pnpm test

      - name: Build web playground
        run: pnpm run build:web

      - name: Check playground (globe demo) and render-bench (wire-format bench)
        run: |
          pnpm exec wrangler dev --local --ip 127.0.0.1 --port 8787 --show-interactive-dev-session=false > /tmp/capnwasm-wrangler.log 2>&1 &
          WRANGLER_PID=$!
          trap 'kill $WRANGLER_PID || true' EXIT
          node -e 'const url="http://127.0.0.1:8787/playground"; let tries=0; async function main(){ while(++tries<=90){ try{ const r=await fetch(url); if(r.ok) return; } catch {} await new Promise(r=>setTimeout(r,1000)); } process.exit(1); } main();'
          # /playground is now the Cloudflare-globe demo; the bench it
          # used to host moved to /render-bench.
          PLAYGROUND_URL=http://127.0.0.1:8787/playground pnpm run check:playground
          RENDER_BENCH_URL=http://127.0.0.1:8787/render-bench pnpm run check:render-bench

name: release

# Publishes capnwasm to npm via npm Trusted Publisher (GitHub Actions OIDC).
# npm package settings must match:
#   Publisher: GitHub Actions
#   Repository: teamchong/capnwasm
#   Workflow filename: release.yml
#   Environment: unset, unless this workflow is updated to use the same name
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: pnpm

      - name: Use npm with trusted publishing support
        run: npm install -g npm@11

      - name: Install (workspace)
        run: pnpm install --frozen-lockfile

      - name: Install browser test dependencies
        run: pnpm exec playwright install --with-deps chromium

      - name: Generate web test schemas
        run: pnpm -C web run codegen

      - name: Run tests before publishing
        run: pnpm test

      - name: Verify tag matches package.json version
        if: github.event_name == 'push'
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          PKG=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$PKG" ]; then
            echo "Tag v$TAG does not match package.json version $PKG"
            exit 1
          fi

      - name: Check npm version
        id: npm-version
        run: |
          PKG=$(node -p "require('./package.json').version")
          if npm view "capnwasm@$PKG" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "capnwasm@$PKG is already published; skipping npm publish."
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: steps.npm-version.outputs.published != 'true'
        run: npm publish --provenance --access public

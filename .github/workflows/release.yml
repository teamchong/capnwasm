name: release

# Publishes capnwasm to npm via npm Trusted Publisher (GitHub Actions OIDC).
# A package.json version bump on main is the release signal. The workflow
# publishes the package, creates the matching vX.Y.Z tag, and opens a GitHub
# Release. Manual dispatch follows the same path for the current version.
#
# npm package settings must match:
#   Publisher: GitHub Actions
#   Repository: teamchong/capnwasm
#   Workflow filename: release.yml
#   Environment: unset, unless this workflow is updated to use the same name
on:
  push:
    branches:
      - main
    paths:
      - package.json
  workflow_dispatch:

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      should_release: ${{ steps.version.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if version needs release
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="v$VERSION"
          echo "Version: $VERSION, Tag: $TAG"

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists; skipping release."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          elif npm view "capnwasm@$VERSION" version >/dev/null 2>&1; then
            echo "capnwasm@$VERSION is already published; skipping release."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "Version $VERSION not yet released."
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

  publish-npm:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: pnpm

      - name: Install (workspace)
        run: pnpm install --frozen-lockfile

      - name: Install browser test dependencies
        run: pnpm exec playwright install --with-deps chromium

      - name: Generate web test schemas
        run: pnpm -C web run codegen

      - name: Run tests before publishing
        run: pnpm test

      - name: Publish to npm
        run: npm publish --provenance --access public

  create-tag:
    needs: [check-version, publish-npm]
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create and push tag
        run: |
          TAG="${{ needs.check-version.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

  release:
    needs: [check-version, publish-npm, create-tag]
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.check-version.outputs.tag }}
          generate_release_notes: true
